      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }

            "session": {"cells": [{"code_hash": "0fc30cd311c82f373a571d7b52f4627f", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "5e70343ebcc979a747f5d186a822cadb", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"nyc-traffic-fatality-analysis-vision-zero-policy-brief\"\u003ENYC Traffic Fatality Analysis \u2014 Vision Zero Policy Brief\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EAuthor:\u003C/strong\u003E Remy Ndayizeye\n\u003Cstrong\u003EContext:\u003C/strong\u003E Northeast Big Data Innovation Hub \u00b7 National Student Data Corps\n\u003Cstrong\u003EDate:\u003C/strong\u003E May 2026\u003C/span\u003E\n\u003Chr /\u003E\n\u003Ch2 id=\"executive-summary-the-lethality-paradox\"\u003EExecutive Summary: The Lethality Paradox\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ENYC reached a historic safety milestone in 2025 with 205 traffic deaths\u2014the lowest count since 1910.\nHowever, a critical \u003Cstrong\u003E\"Lethality Paradox\"\u003C/strong\u003E has emerged: while total crashes are down, the likelihood of a crash\nbeing fatal has increased since 2020. This analysis utilizes a \u003Cstrong\u003ERecency-Weighted Hybrid Model\u003C/strong\u003E to distinguish between chronic infrastructure failures and emerging behavioral crises.\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EData Source:\u003C/strong\u003E NYC Open Data \u2014 1.95M crashes (July 2012 \u2013 April 2026)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "cf7efdc894ffe49141b5d1425ed5cfcb", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "d84b645246fc3412871cdb906c11897d", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column 003E\n\u003Cspan class=\"paragraph\"\u003EThe diverging chart highlights a fundamental shift in road safety. While total crash volume decreased, the \u003Cstrong\u003Ecomposition\u003C/strong\u003E of crash factors changed significantly.\u003C/span\u003E\n\u003Cdiv style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 20px;\"\u003E\n    \u003Cdiv\u003E\n        \u003Cstrong\u003E\ud83d\udcc8 Significant Increases\u003C/strong\u003E\n        \u003Cul\u003E\u003Cli\u003E\u003Cb\u003EUnsafe Speed\u003C/b\u003E: 11.4% \u2192 25.3% (\u003Cspan style='color: #e74c3c;'\u003E+14.0%\u003C/span\u003E)\u003C/li\u003E\u003Cli\u003E\u003Cb\u003EDriver Inexperience\u003C/b\u003E: 2.0% \u2192 4.1% (\u003Cspan style='color: #e74c3c;'\u003E+2.1%\u003C/span\u003E)\u003C/li\u003E\u003Cli\u003E\u003Cb\u003EPassing or Lane Usage Improper\u003C/b\u003E: 1.1% \u2192 3.2% (\u003Cspan style='color: #e74c3c;'\u003E+2.0%\u003C/span\u003E)\u003C/li\u003E\u003C/ul\u003E\n    \u003C/div\u003E\n    \u003Cdiv\u003E\n        \u003Cstrong\u003E\ud83d\udcc9 Significant Decreases\u003C/strong\u003E\n        \u003Cul\u003E\u003Cli\u003E\u003Cb\u003EPassenger Distraction\u003C/b\u003E: 4.2% \u2192 0.0% (\u003Cspan style='color: #2ecc71;'\u003E-4.2%\u003C/span\u003E)\u003C/li\u003E\u003Cli\u003E\u003Cb\u003EFailure to Yield Right-of-Way\u003C/b\u003E: 15.6% \u2192 11.8% (\u003Cspan style='color: #2ecc71;'\u003E-3.7%\u003C/span\u003E)\u003C/li\u003E\u003Cli\u003E\u003Cb\u003EPhysical Disability\u003C/b\u003E: 2.6% \u2192 0.2% (\u003Cspan style='color: #2ecc71;'\u003E-2.4%\u003C/span\u003E)\u003C/li\u003E\u003C/ul\u003E\n    \u003C/div\u003E\n\u003C/div\u003E\n\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPolicy Interpretation:\u003C/strong\u003E\nThe rise in \u003Cstrong\u003EUnsafe Speed\u003C/strong\u003E as a fatal factor explains why mortality rates spiked even on less congested roads. This suggests that \"Vision Zero\" infrastructure (narrower lanes, speed bumps) is more critical now than ever to counteract the behavioral trend toward higher speeds.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003EAnalysis: Remy Ndayizeye \u00b7 U.S. DOT FHWA Context\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2e958a65a80cb3e0140556c4b844bc29", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"jurisdictional-attribution-full-accounting\"\u003EJurisdictional Attribution: Full Accounting\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ETo identify policy levers, we classified 100% of fatal crash locations:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E76.4% Surface Streets:\u003C/strong\u003E Local corridors under municipal (\u003Cstrong\u003ENYC DOT\u003C/strong\u003E) jurisdiction.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E14.8% High-Speed Corridors:\u003C/strong\u003E Limited-access roads often involving \u003Cstrong\u003EState DOT\u003C/strong\u003E oversight.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E8.9% Unclassified/Off-Street:\u003C/strong\u003E Locations with insufficient name data or occurring in non-roadway areas.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPolicy Impact:\u003C/strong\u003E Even when accounting for data gaps, over three-quarters of traffic fatalities occur on city-managed surface streets, reinforcing that municipal engineering remains the primary tool for achieving Vision Zero.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ae3026ebc491b43bc51d7859bb6a7548", "console": [], "id": "SFPL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "162ef7eaa4169d15f0558eef19b27500", "console": [], "id": "BYtC", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items:
