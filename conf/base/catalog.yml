# ── INPUTS ──────────────────────────────────────────────────────────────────

# Raw crash data from Socrata (input to pipeline)
nyc_crashes_raw:
  type: pandas.ParquetDataset
  filepath: data/02_primary/nyc_crashes.parquet  
  

# Watermark tracker (input to pipeline)
metadata_raw:
  type: json.JSONDataset
  filepath: data/01_raw/fetch_metadata.json 

#Geospatial data (input to pipeline)
nyc_census_geometry_raw:
 type: geopandas.GeoJSONDataset
 filepath: data/01_raw/census_tracts.geojson


# ── OUTPUTS ─────────────────────────────────────────────────────────────────

# catalog.yml

# Output of your existing census API node — just a parquet on disk
# For your census API output (GeoJSON)
nyc_census_raw:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/nyc_census_raw.parquet


# For your final merged GeoDataFrame
nyc_census_geodf:
  type: geopandas.GeoJSONDataset
  filepath: data/02_intermediate/nyc_census_geodf.geojson
  

# Processed crash data (output of pipeline)
nyc_crashes:
  type: pandas.ParquetDataset
  filepath: data/02_primary/nyc_crashes.parquet


# Updated watermark after each run (output of pipeline)
fetch_metadata:
  type: json.JSONDataset
  filepath: data/01_raw/fetch_metadata.json



