services:

  # ── Kedro Viz (pipeline visualization) ──────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: tdsp-pipeline
    container_name: nyc-crashes-pipeline
    volumes:
      - ./data:/app/data          # persist ingested data
      - ./conf:/app/conf          # config changes without rebuild
      # NOTE: conf/local/ (credentials) should be mounted separately
      # or passed as environment variables — never baked into the image
    ports:
      - "4141:4141"               # Kedro Viz
    restart: unless-stopped

  # ── Marimo Notebook (analysis) ───────────────────────────────────────────────
  notebook:
    build:
      context: .
      dockerfile: Dockerfile.notebook
    image: tdsp-notebook
    container_name: nyc-crashes-notebook
    volumes:
      - ./data:/app/data          # read processed parquet files
      - ./notebooks:/app/notebooks
    ports:
      - "8080:8080"               # Marimo
    restart: unless-stopped

  # ── Pipeline Runner (on-demand) ──────────────────────────────────────────────
  pipeline-runner:
    image: tdsp-pipeline          # reuse already-built pipeline image
    container_name: nyc-crashes-runner
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf
    command: kedro run
    profiles:
      - pipeline                  # run with: docker compose --profile pipeline up
